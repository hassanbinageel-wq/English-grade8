name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
permissions:
  contents: write
defaults:
  run:
    working-directory: misbah-english-grade8
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: android-actions/setup-android@v3
      - run: yes | sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" >/dev/null 2>&1 || true
      - run: npm install
      - run: npx cap add android
      - run: npx capacitor-assets generate --android || echo "icons skipped"
      - run: npx cap sync android
      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace
      - run: mkdir -p dist && cp android/app/build/outputs/apk/debug/app-debug.apk dist/Misbah-English-Grade8.apk
      - uses: actions/upload-artifact@v4
        with:
          name: Misbah-English-Grade8-APK
          path: misbah-english-grade8/dist/Misbah-English-Grade8.apk
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: مصباح الإنجليزية v1.0.${{ github.run_number }}
          files: misbah-english-grade8/dist/Misbah-English-Grade8.apk
